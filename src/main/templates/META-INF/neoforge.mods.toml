modLoader = "javafml"
loaderVersion = "[${loader_version},)"
issueTrackerURL = "${mod_issue_tracker}"
license = "${mod_license}"

[[mods]]
modId = "${mod_id}"
version = "${version}"
displayName = "${mod_name}"
authors = "KilaBash, screret, Mikerooni, serenibyss, Tech22, YoungOnion, Mikerooni, Ghostipedia"
description = "${mod_description}"
logoFile = "icon.png"
displayURL = "${mod_url}"
credits = "GregoriusT, Mr_Touchyou, Zerrens for making GregTech and textures, the GT5u authors and maintainers for providing the original code, and the community."

enumExtensions = "META-INF/enum_extensions.json"
[mods."modernfix:integration"]
    client_entrypoint = "com.gregtechceu.gtceu.integration.modernfix.GTModernFixIntegration"

[[mixins]]
    config = "${mod_id}.mixins.json"
[[mixins]]
    config = "mixin_configs/${mod_id}-neoforge.mixins.json"
    requiredMods = ["neoforge"]
[[mixins]]
    config = "mixin_configs/${mod_id}-ldlib.mixins.json"
    requiredMods = ["ldlib"]
[[mixins]]
    config = "mixin_configs/${mod_id}-sodium.mixins.json"
    requiredMods = ["sodium"]
[[mixins]]
    config = "mixin_configs/${mod_id}-embeddium.mixins.json"
    requiredMods = ["embeddium"]
[[mixins]]
    config = "mixin_configs/${mod_id}-iris.mixins.json"
    requiredMods = ["iris"]
[[mixins]]
    config = "mixin_configs/${mod_id}-emi.mixins.json"
    requiredMods = ["emi"]
[[mixins]]
    config = "mixin_configs/${mod_id}-jei.mixins.json"
    requiredMods = ["jei"]
[[mixins]]
    config = "mixin_configs/${mod_id}-rei.mixins.json"
    requiredMods = ["roughlyenoughitems"]
[[mixins]]
    config = "mixin_configs/${mod_id}-ftbchunks.mixins.json"
    requiredMods = ["ftbchunks"]
[[mixins]]
    config = "mixin_configs/${mod_id}-xaerominimap.mixins.json"
    requiredMods = ["xaerominimap"]
[[mixins]]
    config = "mixin_configs/${mod_id}-xaeroworldmap.mixins.json"
    requiredMods = ["xaeroworldmap"]

[[accessTransformers]]
    file = "META-INF/accesstransformer.cfg"

[[dependencies.${mod_id}]]
    modId = "neoforge"
    type = "required"
    versionRange = "[${neo_version},)"
    ordering = "NONE"
    side = "BOTH"

[[dependencies.${mod_id}]]
    modId = "minecraft"
    type = "required"
    versionRange = "${minecraft_version}"
    ordering = "NONE"
    side = "BOTH"

[[dependencies.${mod_id}]]
    modId = "configuration"
    type = "required"
    embedded = true
    versionRange = "[${configuration_version},)"
    ordering = "AFTER"
    side = "BOTH"
    [dependencies.${mod_id}.mc-publish]
        ignore = false
        modrinth = "configuration"
        curseforge = "configuration"

[[dependencies.${mod_id}]]
    modId = "kubejs"
    type = "optional"
    versionRange = "[${kjs_version},)"
    ordering = "AFTER"
    side = "BOTH"

[[dependencies.${mod_id}]]
    modId = "jei"
    type = "optional"
    versionRange = "[${jei_version},)"
    ordering = "AFTER"
    side = "BOTH"

[[dependencies.${mod_id}]]
    modId = "emi"
    type = "optional"
    versionRange = "[${emi_version},)"
    ordering = "AFTER"
    side = "BOTH"

[[dependencies.${mod_id}]]
    modId = "jade"
    type = "optional"
    versionRange = "[${jade_version},)"
    ordering = "NONE"
    side = "BOTH"


#[features.${mod_id}]
#openGLVersion = "[3.2,)"
